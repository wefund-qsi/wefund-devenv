services:
  postgres:
    image: postgres:16-alpine
    container_name: we-fund-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wefund_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wefund

  pgadmin:
    image: dpage/pgadmin4
    container_name: we-fund-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - wefund
  
  wefund-projects-services-api:
    build:
      context: ./wefund-projects-service
      dockerfile: Dockerfile
    container_name: wefund-projects-api
    restart: unless-stopped
    ports:
      - "3000:1001"
    environment:
      JWT_SECRET: cle-demo-123
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - wefund
  
  wefund-contributions-paiements-utilisateurs-api:
    build:
      context: ./wefund-contributions-paiements-utilisateurs
      dockerfile: Dockerfile
    container_name: wefund-contributions-paiements-utilisateurs-api
    restart: unless-stopped
    ports:
      - "3000:1002"
    environment:
      JWT_SECRET: cle-demo-123
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - wefund

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  wefund:
    driver: bridge