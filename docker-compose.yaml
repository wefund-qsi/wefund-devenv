services:
  postgres:
    image: postgres:16-alpine
    container_name: we-fund-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wefund_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wefund

  pgadmin:
    image: dpage/pgadmin4
    container_name: we-fund-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - wefund
  
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --mode dev-container
      - --smp 1
    ports:
      - "19092:19092"
    networks:
      - wefund

  wefund-projects-service-api:
    build:
      context: ./wefund-projects-service
      dockerfile: Dockerfile
    container_name: wefund-projects-service-api
    restart: unless-stopped
    ports:
      - "1001:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-cle-demo-123}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: wefund_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wefund
  
  wefund-contributions-paiements-utilisateurs-api:
    build:
      context: .
      dockerfile: wefund-contributions-paiements-utilisateurs/Dockerfile
    container_name: wefund-contributions-paiements-utilisateurs-api
    restart: unless-stopped
    ports:
      - "1002:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-cle-demo-123}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: wefund_db
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - wefund

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  wefund:
    driver: bridge